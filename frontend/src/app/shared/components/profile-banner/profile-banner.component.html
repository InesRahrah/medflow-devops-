<div class="profile-banner-wrapper" *ngIf="visible">
  <div class="profile-banner-card" [class.slide-out]="isComplete">
    <div class="banner-inner">
      <div class="banner-left">
        <!-- Circular progress indicator -->
        <div class="progress-ring-wrap">
          <svg class="progress-ring" width="44" height="44" viewBox="0 0 44 44">
            <circle class="ring-bg" cx="22" cy="22" r="18" fill="none" stroke-width="3.5" />
            <circle class="ring-fg" cx="22" cy="22" r="18" fill="none" stroke-width="3.5"
              [attr.stroke-dasharray]="circumference"
              [attr.stroke-dashoffset]="dashOffset" />
          </svg>
          <span class="pct-label">{{ completionPct }}%</span>
        </div>

        <div class="banner-text">
          <strong>Your profile is incomplete</strong>
          <span class="banner-sub"> Complete your profile to unlock all features</span>
        </div>
      </div>

      <div class="banner-right">
        <!-- Main Actions -->
        <ng-container *ngIf="!showDismissOptions">
          <button class="cta-btn" (click)="$event.stopPropagation(); onCompleteCta()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            Complete my profile
          </button>
          <button class="dismiss-btn-text" (click)="$event.stopPropagation(); toggleDismissOptions()" aria-label="Dismiss">
            Later
          </button>
        </ng-container>

        <!-- Dismiss Duration Options -->
        <div class="dismiss-options" *ngIf="showDismissOptions" (click)="$event.stopPropagation()">
          <span class="options-label">Remind me in:</span>
          <div class="options-row">
            <button class="opt-btn" (click)="dismissFor(1)">1m</button>
           <!-- <button class="opt-btn" (click)="dismissFor(5)">5m</button> -->
            <button class="opt-btn" (click)="dismissFor(10)">10m</button>
            <button class="opt-btn" (click)="dismissFor(60)">1h</button>
            <button class="opt-cancel" (click)="toggleDismissOptions()" aria-label="Cancel">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
