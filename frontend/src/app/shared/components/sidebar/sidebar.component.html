<aside class="medflow-sidebar">
  <div class="sidebar-header">
    <div class="logo-container">
      <img src="assets/images/logo-medflow.png" alt="MedFlow" class="sidebar-logo" />
    </div>
  </div>

  <nav class="sidebar-nav">
    <div *ngFor="let group of navGroups" class="nav-group">
      <h3 *ngIf="group.section" class="nav-section-header">{{ group.section }}</h3>
      <ul class="nav-list">
        <li *ngFor="let link of group.links" class="nav-item">
          <a 
            [routerLink]="link.route" 
            routerLinkActive="active" 
            [routerLinkActiveOptions]="{ exact: !!link.exact }"
            class="nav-link"
          >
            <div class="icon-wrapper">
              <i [class]="link.icon"></i>
            </div>
            <span class="link-label">{{ link.label }}</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <div class="icon-wrapper">
        <i class="fas fa-sign-out-alt"></i>
      </div>
      <span class="link-label">Logout</span>
    </button>
  </div>
</aside>
