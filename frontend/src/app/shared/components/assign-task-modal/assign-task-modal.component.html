<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-content glass" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Assign New Task</h2>
      <button class="btn-close" (click)="closeModal()">&times;</button>
    </div>

    <div class="modal-body">
      <div class="alert error" *ngIf="taskError">
        {{ taskError }}
      </div>

      <form (ngSubmit)="submitTask()" #taskFormDir="ngForm">
        
        <div class="form-group" *ngIf="!preSelectedStaffId">
          <label>Select Staff Member</label>
          <app-custom-dropdown
            name="assignedStaffId"
            [(ngModel)]="taskForm.assignedStaffId"
            [options]="staffOptions"
            placeholder="-- Choose Staff (Clinical) --"
            [searchable]="true"
            required>
          </app-custom-dropdown>
        </div>

        <div class="form-group readonly-context" *ngIf="preSelectedStaffId">
          <label>Assigning To</label>
          <div class="context-badge" style="padding: 10px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 6px; display: inline-flex; align-items: center; gap: 8px; font-weight: 500; color: var(--primary);">
            <i class="fas fa-clipboard-user" style="color: var(--primary-accent);"></i> {{ preSelectedStaffName }}
          </div>
        </div>

        <div class="form-group mt-3">
          <label>Task Title</label>
          <input type="text" name="title" [(ngModel)]="taskForm.title" placeholder="e.g. Check vitals, Inventory count..." required>
        </div>

        <div class="form-group mt-3">
          <label>Priority</label>
          <div class="priority-selector">
            <label class="radio-btn" *ngFor="let opt of priorityOptions">
              <input type="radio" name="priority" [value]="opt.value" [(ngModel)]="taskForm.priority">
              <span>{{ opt.label }}</span>
            </label>
          </div>
        </div>

        <div class="form-group mt-3">
          <label>Description (Optional)</label>
          <textarea name="description" [(ngModel)]="taskForm.description" rows="3" placeholder="Additional details..."></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-ghost" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary" [disabled]="isAssigning || !taskForm.title || !taskForm.assignedStaffId">
            <span *ngIf="!isAssigning">Assign Task</span>
            <span *ngIf="isAssigning"><i class="fas fa-spinner fa-spin"></i> Assigning...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
