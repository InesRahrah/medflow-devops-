<div class="setup-container">
  <div class="setup-card">
    <!-- Header with Progress -->
    <div class="setup-header">
      <div class="logo">
        <span class="logo-text">MEDFLOW</span>
      </div>
      <h2>Account Setup</h2>

      <div class="progress-section">
        <div class="step-indicators">
          <div
            class="step-indicator"
            [class.active]="currentStep >= 1"
            [class.completed]="currentStep > 1"
          >
            <span class="step-num">1</span>
            <span class="step-label">Role</span>
          </div>
          <div class="step-connector" [class.active]="currentStep > 1"></div>
          <div class="step-indicator" [class.active]="currentStep >= 2">
            <span class="step-num">2</span>
            <span class="step-label">Details</span>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" [style.width.%]="progressPercent"></div>
        </div>
      </div>
    </div>

    <!-- Step 1: Role Selection -->
    <div *ngIf="currentStep === 1" [@roleSwitch] class="step-content">
      <div class="step-intro">
        <h3 class="step-title">Who are you?</h3>
      </div>

      <div class="role-grid">
        <div
          *ngFor="let role of roles"
          class="role-card"
          [class.active]="pendingRole === role.value"
          (click)="selectRole(role.value)"
        >
          <div class="role-icon-wrapper">
            <svg
              *ngIf="role.value === 'PATIENT'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="role-icon"
            >
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <svg
              *ngIf="role.value === 'DOCTOR'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="role-icon"
            >
              <path
                d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"
              />
              <circle cx="20" cy="10" r="2" />
              <path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4" />
            </svg>
            <svg
              *ngIf="role.value === 'LABO'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="role-icon"
            >
              <path d="M10 2v7.5"></path>
              <path d="M14 2v7.5"></path>
              <path d="M8.5 2h7"></path>
              <path
                d="M14 11.5c3.31 0 6 2.69 6 6s-2.69 6-6 6H10c-3.31 0-6-2.69-6-6s2.69-6 6-6"
              ></path>
              <path d="M10 16.5h4"></path>
            </svg>
            <svg
              *ngIf="role.value === 'HOSPITAL'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="role-icon"
            >
              <path d="M3 21h18"></path>
              <path d="M5 21V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v14"></path>
              <path d="M9 11h6"></path>
              <path d="M12 8v6"></path>
            </svg>
            <svg
              *ngIf="role.value === 'INSURANCE'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="role-icon"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              <polyline points="9 12 11 14 15 10"></polyline>
            </svg>
            <!-- PHARMACIST -->
            <svg
              *ngIf="role.value === 'PHARMACIST'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="role-icon"
            >
              <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              <path d="M12 8v8M8 12h8"></path>
            </svg>

            <!-- DELIVERY AGENT -->
            <svg
              *ngIf="role.value === 'DELIVERY_AGENT'"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="role-icon"
            >
              <rect x="1" y="3" width="15" height="13"></rect>
              <path d="M16 8h4l3 3v5h-7z"></path>
              <circle cx="5.5" cy="18.5" r="2.5"></circle>
              <circle cx="18.5" cy="18.5" r="2.5"></circle>
            </svg>
            <svg
              *ngIf="role.value === 'CENTRAL_PHARMACY'"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 500 500"
              class="role-icon pharmacy-icon"
            >
              <path
                class="pharmacy-path"
                d="m346.91 186.25c1.64 5.66 2.53 12.04 2.53 19.25 0 12.74-2.79 25.02-7.79 36.28 7.34-5.23 13.92-10.59 20.28-15.52 22.54-17.47 43.81-23.55 60.27-24.56 8.82-0.55 23.29-7.35 23.29-15.45h-98.58zm-3.21 19.25c0-44.83-41.03-56.98-77.49-62.81-36.76-5.87-79.26-18.99-79.26-58.24 0-19.245 12.02-38.365 32.66-38.365 30.39 0 35.71 23.044 35.84 26.336 0.12 3.292-8.85 5.63-10.01 12.155-1.39 7.85 2.03 15.704 6.97 22.034 4.4 5.65 10.76 17.09 17.09 16.08 6.78-1.09 9.24-12.66 11.14-20.26 1.9-7.597 5.19-14.056 2.03-21.146-3.92-8.782-7.85-4.433-10.89-10.761-1.74-3.625-8.48-40.392-49.13-40.392-28.35 0-54.19 23.425-56.72 50.014-3.63 38.065 11.39 52.415 43.05 67.365 49.32 23.27 100.53 22.28 100.53 54.95 0 31.9-10.89 48.87-29.63 61.28-3.23 2.14-9.38 4.95-15.4 7.02v22.42c1.24-0.17 2.5-0.36 3.75-0.57 42.04-7.09 75.47-44.57 75.47-87.11zm-48.52-19.25h-240.68c0.005 8.1 14.476 14.9 23.303 15.45 16.46 1.01 37.727 7.09 60.267 24.56 23.02 17.85 48.94 41.34 103.19 43.63v69c3.15 0.58 6.67 0.9 10.51 0.9 1.61 0 4.11-0.1 6.97-0.41v-72.84c29.11-6.38 45.03-31.22 45.03-64.08 0-6.77-2.78-11.85-8.59-16.21zm-53.92 205.36c4.9 2.98 10.91 4.29 17.48 5.17v-26.94c-5.85 0.39-11.73 0.31-17.48-0.27v22.04zm57.87 21.79c-9.37-7.09-21.53-8.74-43.18-11.4-25.63-3.15-32.4-19.28-33.15-36.28-6.65-2.2-12.8-5.27-18.12-9.28-1.23 5.79-1.78 11.81-1.78 17.96 0 25.57 27.57 36.44 47.1 39.25 20.26 2.91 39.25 3.67 41.91 4.81 2.69 1.15 4.31 2.41 5.45 3.67 1.14 1.27 4.17 3.04 6.07 1.77 1.9-1.26 0.38-6.96-4.3-10.5zm-69.14-78.52c1.65-1.69 3.52-3.15 5.53-4.44v-15.64c-4.87 2.74-9.08 5.81-12.7 9.21 0 4.21 2.52 8.04 7.17 10.87zm55.72-7.33c0 12.16-15.96 17.98-33.94 17.98s-34.69-7.09-34.69-21.52c0-17.82 7.32-24.16 18.44-27.02v-25.01c-24.38 1.88-44.52 24.31-44.52 43.42 0 13.92 2.46 35.76 41.02 46.84 40.52 11.65 87.11-13.92 87.11-39.5 0-12.41-6.35-18.42-14.69-21.02-6.91-2.16-15.12-5.24-39.96 1.93v15.78c3.92-1.08 7.41-1.76 10.84-1.76 7.09 0 10.39 2.28 10.39 9.88zm-132.44 142.32h193.46c0-3.17-10.25-7.72-19.12-8.49-8.86-0.76-20.75-1.24-23.42-3.54-3.67-3.17-9.52-5.36-17.22-7.22-7.85-1.9-28.23-3.54-28.23-14.68v-15.47c-3.2-0.32-6.39-0.68-9.56-1.14-2.45-0.35-5.13-0.84-7.92-1.5v18.11c0 11.14-20.38 12.78-28.23 14.68-7.7 1.86-13.55 4.05-17.22 7.22-2.67 2.3-14.57 2.78-23.43 3.54s-19.11 5.32-19.11 8.49z"
              />
            </svg>
          </div>
          <strong class="role-name">{{ role.label }}</strong>
        </div>
      </div>

      <div class="step-footer">
        <button
          class="btn-primary btn-continue"
          [disabled]="!pendingRole"
          (click)="confirmRole()"
        >
          <span>Continue to Details</span>
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="btn-icon"
          >
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- Step 2: Details Form -->
    <div *ngIf="currentStep === 2" [@roleSwitch] class="step-content">
      <div class="step-intro">
        <h3 class="step-title">Complete your Profile</h3>
        <p class="step-subtitle">
          Just a few more details to personalize your account.
        </p>
      </div>

      <form
        #setupForm="ngForm"
        (ngSubmit)="onSubmit(setupForm)"
        class="setup-form"
      >
        <!-- Common: Phone Number -->
        <div class="form-section">
          <div class="form-group full-width">
            <label for="phoneNumber">Phone Number</label>
            <div
              class="input-wrapper"
              [class.has-error]="isFieldInvalid(setupForm, 'phoneNumber')"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                class="field-icon"
              >
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
                ></path>
              </svg>
              <input
                type="tel"
                name="phoneNumber"
                [(ngModel)]="setupData.phoneNumber"
                required
                pattern="^[0-9]{8}$"
                maxlength="8"
                placeholder="e.g. 12345678"
              />
            </div>
            <span
              class="error-text"
              *ngIf="isFieldInvalid(setupForm, 'phoneNumber')"
              >{{ getFieldError(setupForm, "phoneNumber", "Phone") }}</span
            >
          </div>
        </div>

        <div class="role-specific-container">
          <ng-container [ngSwitch]="selectedRole">
            <!-- PATIENT FORM -->
            <div *ngSwitchCase="'PATIENT'" class="form-section fade-in">
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label>
                  <div class="input-wrapper">
                    <input
                      type="text"
                      name="firstName"
                      [(ngModel)]="setupData.firstName"
                      required
                      placeholder="John"
                    />
                  </div>
                </div>
                <div class="form-group">
                  <label>Last Name</label>
                  <div class="input-wrapper">
                    <input
                      type="text"
                      name="lastName"
                      [(ngModel)]="setupData.lastName"
                      required
                      placeholder="Doe"
                    />
                  </div>
                </div>
              </div>

              <!-- Blood Type Moved Up -->
              <div class="form-group full-width">
                <label>Blood Type</label>
                <app-custom-dropdown
                  name="bloodType"
                  [(ngModel)]="setupData.bloodType"
                  [options]="bloodTypeOptions"
                  placeholder="Select your blood type"
                  required
                ></app-custom-dropdown>
              </div>

              <div class="form-row">
                <!-- Gender Switched to Left -->
                <div class="form-group">
                  <label>Gender</label>
                  <div class="segmented-control">
                    <label
                      class="control-option"
                      [class.active]="setupData.gender === 'MALE'"
                    >
                      <input
                        type="radio"
                        name="gender"
                        [(ngModel)]="setupData.gender"
                        value="MALE"
                        required
                      />
                      <span>Male</span>
                    </label>
                    <label
                      class="control-option"
                      [class.active]="setupData.gender === 'FEMALE'"
                    >
                      <input
                        type="radio"
                        name="gender"
                        [(ngModel)]="setupData.gender"
                        value="FEMALE"
                        required
                      />
                      <span>Female</span>
                    </label>
                  </div>
                </div>
                <!-- Birth Date Switched to Right -->
                <div class="form-group">
                  <label>Birth Date</label>
                  <div class="input-wrapper">
                    <input
                      type="date"
                      name="dateOfBirth"
                      [(ngModel)]="setupData.dateOfBirth"
                      required
                    />
                  </div>
                </div>
              </div>
            </div>

            <!-- DOCTOR FORM -->
            <div *ngSwitchCase="'DOCTOR'" class="form-section fade-in">
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label>
                  <div class="input-wrapper">
                    <input
                      type="text"
                      name="firstName"
                      [(ngModel)]="setupData.firstName"
                      required
                      placeholder="Dr. Sarah"
                    />
                  </div>
                </div>
                <div class="form-group">
                  <label>Last Name</label>
                  <div class="input-wrapper">
                    <input
                      type="text"
                      name="lastName"
                      [(ngModel)]="setupData.lastName"
                      required
                      placeholder="Smith"
                    />
                  </div>
                </div>
              </div>
              <div class="form-group full-width">
                <label>Specialization</label>
                <div class="input-wrapper">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="field-icon"
                  >
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                  </svg>
                  <input
                    type="text"
                    name="specialization"
                    [(ngModel)]="setupData.specialization"
                    required
                    placeholder="e.g. Cardiology"
                  />
                </div>
              </div>
              <div class="form-group full-width">
                <label>License Number</label>
                <div class="input-wrapper">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="field-icon"
                  >
                    <path
                      d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                    ></path>
                  </svg>
                  <input
                    type="text"
                    name="licenseNumber"
                    [(ngModel)]="setupData.licenseNumber"
                    required
                    placeholder="e.g. MED-123456"
                  />
                </div>
              </div>
            </div>

            <!-- LAB FORM -->
            <div *ngSwitchCase="'LABO'" class="form-section fade-in">
              <div class="form-group full-width">
                <label>Laboratory Name</label>
                <div class="input-wrapper">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="field-icon"
                  >
                    <rect
                      x="3"
                      y="3"
                      width="18"
                      height="18"
                      rx="2"
                      ry="2"
                    ></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                  </svg>
                  <input
                    type="text"
                    name="labName"
                    [(ngModel)]="setupData.labName"
                    required
                    placeholder="City Health Labs"
                  />
                </div>
              </div>
              <div class="form-group full-width">
                <label>Registration Number</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="registrationNumber"
                    [(ngModel)]="setupData.registrationNumber"
                    required
                    placeholder="REG-456-789"
                  />
                </div>
              </div>
              <div class="form-group full-width">
                <label>Address</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="address"
                    [(ngModel)]="setupData.address"
                    required
                    placeholder="123 Medical St, Health City"
                  />
                </div>
              </div>
              <div class="form-group full-width">
                <label>Supported Tests</label>
                <div class="input-wrapper">
                  <app-custom-multi-dropdown
                    name="supportedTests"
                    [(ngModel)]="setupData.supportedTests"
                    [options]="labSupportedTestOptions"
                    placeholder="Select supported tests"
                    [emitAs]="'comma'"
                    [delimiter]="', '"
                    required
                  ></app-custom-multi-dropdown>
                </div>
              </div>
            </div>

            <!-- HOSPITAL FORM -->
            <div *ngSwitchCase="'HOSPITAL'" class="form-section fade-in">
              <div class="form-group full-width">
                <label>Hospital Name</label>
                <div class="input-wrapper">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="field-icon"
                  >
                    <path d="M3 21h18M3 7h18M5 21V7m14 14V7m-7 14V11m-3 0h6" />
                  </svg>
                  <input
                    type="text"
                    name="name"
                    [(ngModel)]="setupData.name"
                    required
                    placeholder="General Medical Center"
                  />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Type</label>
                  <app-custom-dropdown
                    name="hospitalType"
                    [(ngModel)]="setupData.hospitalType"
                    [options]="hospitalTypeOptions"
                    placeholder="Select type"
                    required
                  ></app-custom-dropdown>
                </div>
              </div>
              <div class="form-group full-width">
                <label>Registration Number</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="registrationNumber"
                    [(ngModel)]="setupData.registrationNumber"
                    required
                    placeholder="HOSP-789"
                  />
                </div>
              </div>
            </div>

            <!-- INSURANCE FORM -->
            <div *ngSwitchCase="'INSURANCE'" class="form-section fade-in">
              <div class="form-group full-width">
                <label>Company Name</label>
                <div class="input-wrapper">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="field-icon"
                  >
                    <path
                      d="M20 21V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v13M2 21h20M9 21v-4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v4"
                    />
                  </svg>
                  <input
                    type="text"
                    name="companyName"
                    [(ngModel)]="setupData.companyName"
                    required
                    placeholder="SafeGuard Health"
                  />
                </div>
              </div>
              <div class="form-group full-width">
                <label>Registration Number</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="registrationNumber"
                    [(ngModel)]="setupData.registrationNumber"
                    required
                    placeholder="Registration number"
                  />
                </div>
              </div>
              <div class="form-group full-width">
                <label>Coverage Details</label>
                <div class="input-wrapper">
                  <textarea
                    name="coverageTypes"
                    [(ngModel)]="setupData.coverageTypes"
                    required
                    placeholder="Outline the primary services and coverage areas..."
                  ></textarea>
                </div>
              </div>
            </div>

            <!-- PHARMACIST FORM -->
            <div *ngSwitchCase="'PHARMACIST'" class="form-section fade-in">
              <div class="form-group full-width">
                <label>Pharmacy Name</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="pharmacyName"
                    [(ngModel)]="setupData.pharmacyName"
                    required
                    placeholder="Pharmacy name"
                  />
                </div>
              </div>

              <div class="form-group full-width">
                <label>License Number</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="licenseNumber"
                    [(ngModel)]="setupData.licenseNumber"
                    required
                    placeholder="License number"
                  />
                </div>
              </div>

              <div class="form-group full-width">
                <label>Region</label>
                <div class="input-wrapper">
                  <app-custom-dropdown
                    id="setup-region"
                    name="region"
                    [(ngModel)]="setupData.region"
                    [options]="regions"
                    placeholder="Select region"
                    required
                  ></app-custom-dropdown>
                </div>
              </div>
            </div>

            <div *ngSwitchCase="'DELIVERY_AGENT'" class="form-section fade-in">
              <div class="form-group full-width">
                <label>Full Name</label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    name="deliveryName"
                    [(ngModel)]="setupData.deliveryName"
                    required
                    placeholder="Full name"
                  />
                </div>
              </div>

              <div class="form-group full-width">
                <label>Vehicle Type</label>
                <div class="input-wrapper">
                  <app-custom-dropdown
                    name="vehicleType"
                    [(ngModel)]="setupData.vehicleType"
                    [options]="vehicleTypeOptions"
                    placeholder="Select vehicle"
                    required
                  ></app-custom-dropdown>
                </div>
              </div>
            </div>

            <div *ngSwitchCase="'CENTRAL_PHARMACY'" class="form-section fade-in">
              <div class="form-group full-width">
                <label>Authority</label>
                <div class="input-wrapper">
                  <input type="text" value="Central Pharmacy" disabled />
                </div>
              </div>
            </div>
          </ng-container>
        </div>

        <div *ngIf="errorMessage" class="error-toast">{{ errorMessage }}</div>

        <div class="step-footer split">
          <button type="button" class="btn-secondary" (click)="prevStep()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="btn-icon"
            >
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span>Back</span>
          </button>

          <button
            type="submit"
            class="btn-primary btn-submit"
            [disabled]="isLoading"
          >
            <span *ngIf="!isLoading">Complete Setup</span>
            <div *ngIf="isLoading" class="btn-loader"></div>
            <svg
              *ngIf="!isLoading"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
