<div class="face-modal-backdrop" (click)="close.emit()">
  <div class="face-modal" (click)="$event.stopPropagation()">

    <div class="face-modal-header">
      <div class="face-modal-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        {{ mode === 'register' ? 'Doctor Face Enrollment' : 'Doctor Face Verification' }}
      </div>
      <button class="face-close-btn" (click)="close.emit()" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="face-video-wrap">
      <video #video autoplay muted playsinline class="face-video"></video>
      <div class="face-overlay-ring" [class.scanning]="isLoading"></div>
    </div>

    <div class="face-form">
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="Doctor email"
        class="face-input"
        [disabled]="isLoading || lockEmail"
      />

      <p class="face-hint">
        {{ mode === 'register' ? 'This step is required for doctor accounts.' : 'Face verification is required after password login.' }}
      </p>

      <div class="face-actions" *ngIf="mode === 'register'">
        <button
          class="face-btn"
          (click)="registerWithFace()"
          [disabled]="isLoading || !cameraReady"
        >
          <span *ngIf="!isLoading">Register Face</span>
          <span *ngIf="isLoading" class="face-loader"></span>
        </button>
      </div>

      <div class="face-actions face-actions-single" *ngIf="mode === 'verify'">
        <button
          class="face-btn"
          (click)="verifyWithFace()"
          [disabled]="isLoading || !cameraReady"
        >
          <span *ngIf="!isLoading">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Login with Face
          </span>
          <span *ngIf="isLoading" class="face-loader"></span>
        </button>
      </div>
    </div>

    <p class="face-status" [class.error]="status.toLowerCase().includes('not') || status.toLowerCase().includes('fail') || status.toLowerCase().includes('could') || status.toLowerCase().includes('error')">
      {{ status }}
    </p>

  </div>
</div>
