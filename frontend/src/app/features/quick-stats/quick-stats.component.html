<section class="quick-stats">
  <div class="container stats-grid">
    <div class="stat-item card" *ngFor="let item of items">
      <div class="stat-icon">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon"/>
        </svg>
      </div>
      <div class="stat-info">
        <h4>{{ item.title }}</h4>
        <p *ngFor="let line of item.lines">{{ line }}</p>
      </div>
      <a class="stat-link" href="#appointment">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </div>
</section>
