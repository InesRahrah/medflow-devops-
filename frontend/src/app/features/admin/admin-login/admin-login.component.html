<div class="admin-login-wrapper">
  <div class="login-card shadow-premium">
    <div class="login-header">
      <div class="logo-area">
        <img src="assets/images/logo-medflow.png" alt="MedFlow" class="brand-logo" />
      </div>
      <h1 class="text-gradient">Admin Portal</h1>
      <p class="subtitle">Secure access for system administrators</p>
    </div>

    <div *ngIf="errorMessage" class="error-msg">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="admin@medflow.com"
            [class.error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            [class.error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          />
        </div>
      </div>

      <button type="submit" class="btn-primary-gradient" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Login to Dashboard</span>
        <div *ngIf="loading" class="spinner-small"></div>
      </button>

      <div class="login-footer">
        <p><i class="fas fa-shield-alt"></i> Protected by MedFlow Security</p>
      </div>
    </form>
  </div>
</div>
