<div class="admin-page">
  <header class="page-header">
    <div class="title-group">
      <h1>User Management</h1>
      <p>View and manage all registered platform users and their access levels.</p>
    </div>
    <div class="header-actions">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Filter users..." />
      </div>
      <button class="btn-primary">
        <i class="fas fa-plus"></i>
        <span>Add New User</span>
      </button>
    </div>
  </header>

  <div class="table-container">
    <table class="admin-table">
      <thead>
        <tr>
          <th>User Identity</th>
          <th>Role Assignment</th>
          <th>Joined Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>
            <div class="user-identity">
              <div class="avatar-sm">{{ user.name.charAt(0) }}</div>
              <div class="user-info">
                <span class="user-name">{{ user.name }}</span>
                <span class="user-email">{{ user.email }}</span>
              </div>
            </div>
          </td>
          <td>
            <span class="role-chip">{{ user.role }}</span>
          </td>
          <td>{{ user.joined }}</td>
          <td>
            <span class="status-badge" [class.status-active]="user.status === 'Active'" 
                  [class.status-pending]="user.status === 'Pending'"
                  [class.status-inactive]="user.status === 'Inactive'">
              {{ user.status }}
            </span>
          </td>
          <td>
            <div class="table-actions">
              <button class="icon-btn" title="Edit"><i class="fas fa-edit"></i></button>
              <button class="icon-btn delete" title="Delete"><i class="fas fa-trash"></i></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
