<div class="admin-page">
  <header class="page-header">
    <div class="title-group">
      <h1>Hospital Departments</h1>
      <p>Configure and monitor active clinical departments, heads of staff, and patient load.</p>
    </div>
    <div class="header-actions">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Filter departments..." />
      </div>
      <button class="btn-primary">
        <i class="fas fa-plus-square"></i>
        <span>Register Department</span>
      </button>
    </div>
  </header>

  <div class="table-container">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Department Name</th>
          <th>Head of Dept.</th>
          <th>Total Staff</th>
          <th>Active Patients</th>
          <th>Load Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let dept of departments">
          <td>
            <div class="user-identity">
              <div class="avatar-sm"><i class="fas fa-hospital-user"></i></div>
              <div class="user-info">
                <span class="user-name">{{ dept.name }}</span>
              </div>
            </div>
          </td>
          <td>{{ dept.head }}</td>
          <td>{{ dept.staffCount }}</td>
          <td>{{ dept.patients }}</td>
          <td>
            <span class="status-badge" [class.status-active]="dept.status === 'Active'" 
                  [class.status-high]="dept.status === 'High Load'"
                  [class.status-inactive]="dept.status === 'Maintenance'">
              {{ dept.status }}
            </span>
          </td>
          <td>
            <div class="table-actions">
              <button class="icon-btn" title="Edit"><i class="fas fa-cog"></i></button>
              <button class="icon-btn delete" title="Archive"><i class="fas fa-archive"></i></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
