<div class="medicine-card" [class.expanded]="isExpanded" *ngIf="medicine">
  <!-- Collapsed View -->
  <div class="card-collapsed" (click)="toggleExpand()" *ngIf="!isExpanded">
    <div class="card-header">
      <div class="medicine-name">{{ medicine.medicineName }}</div>
      <svg class="expand-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="card-summary">
      <span class="dosage-badge">{{ getTotalDailyDosage() }} units/day</span>
      <span class="duration-badge">{{ durationLabel }}</span>
    </div>
  </div>

  <!-- Expanded View -->
  <div class="card-expanded" *ngIf="isExpanded && editedMedicine">
    <!-- Close Button -->
    <button class="expand-close" (click)="handleCancel()" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Form Fields -->
    <div class="form-group">
      <label>Medicine Name</label>
      <input
        type="text"
        class="form-input"
        [(ngModel)]="editedMedicine.medicineName"
        readonly
      />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Morning (units)</label>
        <input
          type="number"
          class="form-input"
          [(ngModel)]="editedMedicine.dosage.morning"
          min="0"
        />
      </div>
      <div class="form-group">
        <label>Noon (units)</label>
        <input
          type="number"
          class="form-input"
          [(ngModel)]="editedMedicine.dosage.noon"
          min="0"
        />
      </div>
      <div class="form-group">
        <label>Night (units)</label>
        <input
          type="number"
          class="form-input"
          [(ngModel)]="editedMedicine.dosage.night"
          min="0"
        />
      </div>
    </div>

    <div class="form-group">
      <label>Duration (days)</label>
      <input
        type="number"
        class="form-input"
        [(ngModel)]="editedMedicine.duration"
        min="1"
      />
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea
        class="form-textarea"
        [(ngModel)]="editedMedicine.notes"
        rows="3"
        placeholder="Add any additional notes..."
      ></textarea>
    </div>

    <!-- Action Buttons -->
    <div class="form-actions">
      <button
        class="btn btn-primary icon-btn"
        (click)="handleSave()"
        [disabled]="isSaving"
        type="button"
        title="Save changes"
        aria-label="Save changes"
      >
        <svg *ngIf="!isSaving" viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
          <path d="M4 4h13l3 3v13H4V4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M8 4v6h8V4" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M8 20v-6h8v6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <svg *ngIf="isSaving" class="spin" viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" opacity="0.25"/>
          <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="btn btn-secondary icon-btn" (click)="handleDuplicate()" type="button" title="Duplicate medicine" aria-label="Duplicate medicine">
        <svg viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
          <rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
          <rect x="4" y="4" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <button
        class="btn btn-danger icon-btn"
        (click)="handleRemove()"
        type="button"
        title="Delete medicine"
        aria-label="Delete medicine"
      >
        <svg viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
          <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 6V4h8v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>
