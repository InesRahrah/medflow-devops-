<div class="quick-actions-bar">
  <div class="actions-container">
    <button class="action-btn primary" (click)="handleNewConsultation()" title="Create new consultation">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      New Consultation
    </button>

    <button class="action-btn secondary" (click)="handleAddPrescription()" title="Add a new prescription">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 10h-2v4h2v-4zm0-8h-2v4h2V5z" stroke="currentColor" stroke-width="2"/>
      </svg>
      Add Prescription
    </button>

    <div class="actions-right">
      <button class="action-btn ghost" (click)="handleUploadLab()" title="Request lab results">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" stroke="currentColor" stroke-width="2"/>
        </svg>
        Request Lab
      </button>

      <button class="action-btn ghost" (click)="handleAddNote()" title="Add a clinical note">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2"/>
          <path d="M14 2v6h6M8 13h8M8 17h8" stroke="currentColor" stroke-width="2"/>
        </svg>
        Add Note
      </button>
    </div>
  </div>
</div>
