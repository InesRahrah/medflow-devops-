
<section
  class="hero-section"
  style="
    padding-top: 120px;
    padding-bottom: 60px;
    background-color: var(--primary-bg);
  "
>
  <div class="container">
    <div style="text-align: center; max-width: 800px; margin: 0 auto">
      <h1 class="section-title" style="font-size: 3rem; margin-bottom: 1rem">
        Hospital Administration
      </h1>
      <p class="section-subtitle" style="font-size: 1.25rem">
        Oversee hospital operations, manage staff, and monitor equipment
        statuses.
      </p>
    </div>
  </div>
</section>

<section class="services-section" style="padding: 60px 0">
  <div class="container">
    <div class="section-header">
      <span class="section-label">INFRASTRUCTURE</span>
      <h2 class="section-title">Equipment Tracking</h2>
    </div>

    <div
      style="
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
      "
    >
      <div
        style="
          background: white;
          border-radius: var(--border-radius);
          padding: 2rem;
          box-shadow: var(--card-shadow);
          border-left: 6px solid #10b981;
        "
      >
        <h3
          style="
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
          "
        >
          MRI Scanner
        </h3>
        <p
          style="
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
          "
        >
          <span
            style="
              display: inline-block;
              width: 10px;
              height: 10px;
              background: #10b981;
              border-radius: 50%;
            "
          ></span>
          <strong style="color: #10b981">Operational</strong>
        </p>
        <p style="color: var(--text-secondary); font-size: 0.9rem">
          Location: Radiology Dept
        </p>
        <p style="color: var(--text-muted); font-size: 0.9rem">
          Last maintenance: Jan 10, 2026
        </p>
      </div>

      <div
        style="
          background: white;
          border-radius: var(--border-radius);
          padding: 2rem;
          box-shadow: var(--card-shadow);
          border-left: 6px solid #f59e0b;
        "
      >
        <h3
          style="
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
          "
        >
          X-Ray Machine (Room B)
        </h3>
        <p
          style="
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
          "
        >
          <span
            style="
              display: inline-block;
              width: 10px;
              height: 10px;
              background: #f59e0b;
              border-radius: 50%;
            "
          ></span>
          <strong style="color: #f59e0b">Needs Maintenance</strong>
        </p>
        <p style="color: var(--text-secondary); font-size: 0.9rem">
          Location: Emergency ER
        </p>
        <button
          style="
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: transparent;
            color: #f59e0b;
            border: 1px solid #f59e0b;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
          "
        >
          Schedule Service
        </button>
      </div>
    </div>
  </div>
</section>
