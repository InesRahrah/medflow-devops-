<div class="pharmacy-app-container" [class.sidebar-collapsed]="isSidebarCollapsed">
  <!-- Sidebar -->
  <aside class="pharmacy-sidebar shadow-lg">
    <div class="sidebar-header">
      <div class="brand-logo-container">
        <img src="/assets/images/icon-medflow.png" alt="MedFlow" class="brand-img"/>
      </div>
      <span class="brand-name">Central Pharmacy</span>
    </div>

    <nav class="sidebar-nav">
      <!-- Main Overview -->
      <div class="nav-section">
        <label class="section-title">Overview</label>
        <ul>
          <li>
            <a routerLink="dashboard" routerLinkActive="active" class="nav-item" [title]="isSidebarCollapsed ? 'Dashboard' : ''">
              <i class="fas fa-layer-group"></i>
              <span class="nav-label">Dashboard</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Management -->
      <div class="nav-section">
        <label class="section-title">Management</label>
        <ul>
          <li>
            <a routerLink="requests" routerLinkActive="active" class="nav-item" [title]="isSidebarCollapsed ? 'Requests' : ''">
              <i class="fas fa-tasks"></i>
              <span class="nav-label">Requests</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Account -->
      <div class="nav-section">
        <label class="section-title">Account</label>
        <ul>
          <li>
            <a routerLink="profile" routerLinkActive="active" class="nav-item" [title]="isSidebarCollapsed ? 'Profile' : ''">
              <i class="fas fa-user-circle"></i>
              <span class="nav-label">Profile</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <button class="btn-collapse" title="Collapse Sidebar" (click)="toggleSidebar()">
        <i class="fas fa-chevron-left"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="pharmacy-main">
    <!-- Sidebar Top Bar -->
    <app-sidebar-top-bar></app-sidebar-top-bar>

    <!-- Content Viewport -->
    <div class="pharmacy-content-viewport">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
