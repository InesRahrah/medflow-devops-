<div class="dashboard-content">
  <div class="dashboard-card">

    <!-- Header -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
      <div>
        <span class="section-label">Doctor Portal</span>
        <h2 class="section-title">My Articles</h2>
      </div>
      <button class="btn-primary" (click)="openCreateForm()">+ New Article</button>
    </div>

    <!-- Create / Edit Form -->
    <div *ngIf="showForm" style="background:var(--bg-secondary); border:1px solid var(--border-color);
         border-radius:var(--border-radius); padding:1.5rem; margin-bottom:2rem;">
      <h3 style="margin-bottom:1.2rem; color:var(--text-primary);">
        {{ editingId ? 'Edit Article' : 'Write New Article' }}
      </h3>

      <div style="margin-bottom:1rem;">
        <label style="display:block; margin-bottom:6px; font-weight:500;">Title *</label>
        <input type="text" [(ngModel)]="form.title" placeholder="Article title..."
               style="width:100%; padding:10px 14px; border:1px solid var(--border-color);
                      border-radius:var(--border-radius-sm); font-size:0.95rem; font-family:inherit;" />
      </div>

      <div style="margin-bottom:1rem;">
        <label style="display:block; margin-bottom:6px; font-weight:500;">Content *</label>
        <textarea [(ngModel)]="form.content" placeholder="Write your article content here..."
                  rows="8"
                  style="width:100%; padding:10px 14px; border:1px solid var(--border-color);
                         border-radius:var(--border-radius-sm); font-size:0.95rem;
                         font-family:inherit; resize:vertical;"></textarea>
      </div>

      <div style="margin-bottom:1rem;">
        <label style="display:block; margin-bottom:6px; font-weight:500;">Tags</label>
        <input type="text" [(ngModel)]="form.tags" placeholder="e.g. diabetes, cardiology, nutrition"
               style="width:100%; padding:10px 14px; border:1px solid var(--border-color);
                      border-radius:var(--border-radius-sm); font-size:0.95rem; font-family:inherit;" />
      </div>

      <div style="margin-bottom:1.5rem;">
        <label style="display:block; margin-bottom:6px; font-weight:500;">Status</label>
        <select [(ngModel)]="form.status"
                style="padding:10px 14px; border:1px solid var(--border-color);
                       border-radius:var(--border-radius-sm); font-size:0.95rem; font-family:inherit;">
          <option value="DRAFT">Draft</option>
          <option value="PUBLISHED">Published</option>
        </select>
      </div>

      <div style="display:flex; gap:12px;">
        <button class="btn-primary" (click)="saveArticle()">
          {{ editingId ? 'Update Article' : 'Publish Article' }}
        </button>
        <button class="btn-outline" (click)="cancelForm()">Cancel</button>
      </div>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" style="text-align:center; padding:2rem; color:var(--text-muted);">
      Loading articles...
    </div>

    <!-- Articles List -->
    <div *ngIf="!loading && articles.length > 0">
      <div *ngFor="let article of articles" class="card"
           style="padding:1.2rem 1.5rem; margin-bottom:1rem;
                  display:flex; justify-content:space-between; align-items:center;">
        <div>
          <h4 style="margin:0 0 6px; color:var(--text-primary);">{{ article.title }}</h4>
          <span style="font-size:0.8rem; color:var(--text-muted);">🏷️ {{ article.tags }}</span>
          <span style="margin-left:12px; font-size:0.8rem;"
                [style.color]="article.status === 'PUBLISHED' ? 'green' : 'orange'">
            ● {{ article.status }}
          </span>
        </div>
        <button class="btn-outline" (click)="openEditForm(article)"
                style="padding:6px 16px; font-size:0.85rem;">Edit</button>
      </div>
    </div>

    <!-- Empty state -->
    <div *ngIf="!loading && articles.length === 0"
         style="text-align:center; padding:3rem; color:var(--text-muted);">
      <p>No articles yet. Click "New Article" to write your first one.</p>
    </div>

  </div>
</div>
