<div class="central-pharmacy-container" [class.sidebar-collapsed]="isSidebarCollapsed">
  <!-- Sidebar -->
  <aside class="central-pharmacy-sidebar shadow-lg">
    <div class="sidebar-header">
      <div class="brand-logo-container">
        <img src="/assets/images/icon-medflow.png" alt="MedFlow" class="brand-img"/>
      </div>
      <span class="brand-name">Central Pharmacy</span>
    </div>

    <nav class="sidebar-nav">
      <!-- Main Overview -->
      <div class="nav-section">
        <label class="section-title">Overview</label>
        <ul>
          <li>
            <a routerLink="." routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item" [title]="isSidebarCollapsed ? 'Home' : ''">
              <i class="fas fa-home"></i>
              <span class="nav-label">Home</span>
            </a>
          </li>
          <li>
            <a routerLink="dashboard" routerLinkActive="active" class="nav-item" [title]="isSidebarCollapsed ? 'Dashboard' : ''">
              <i class="fas fa-layer-group"></i>
              <span class="nav-label">Dashboard</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Management -->
      <div class="nav-section">
        <label class="section-title">Management</label>
        <ul>
          <li>
            <a routerLink="requests" routerLinkActive="active" class="nav-item" [title]="isSidebarCollapsed ? 'Requests' : ''">
              <i class="fas fa-tasks"></i>
              <span class="nav-label">Requests</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Account -->
      <div class="nav-section">
        <label class="section-title">Account</label>
        <ul>
          <li>
            <a routerLink="profile" routerLinkActive="active" class="nav-item" [title]="isSidebarCollapsed ? 'Profile' : ''">
              <i class="fas fa-user-circle"></i>
              <span class="nav-label">Profile</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <button class="sidebar-toggle" (click)="toggleSidebar()" [title]="isSidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
        <i class="fas" [class.fa-chevron-right]="!isSidebarCollapsed" [class.fa-chevron-left]="isSidebarCollapsed"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-viewport">
    <!-- App Sidebar Top Bar -->
    <app-sidebar-top-bar></app-sidebar-top-bar>

    <!-- Page Content -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
