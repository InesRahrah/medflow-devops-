<article class="appointment-card" [class.is-timeline]="timeline" [class.is-past]="past" [class.is-important]="important">
  <div class="timeline-dot" *ngIf="timeline"></div>

  <div class="card-meta">
    <div class="meta-pill date-pill">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M8 2v3M16 2v3M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" />
      </svg>
      <span>{{ dateLabel }}</span>
    </div>

    <div class="meta-pill time-pill">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 6v6l4 2" />
        <path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" />
      </svg>
      <span>{{ timeLabel }}</span>
    </div>
  </div>

  <div class="card-main">
    <div class="doctor-line">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      <h4>{{ doctorName }}</h4>
    </div>

    <p class="notes" *ngIf="notes">{{ notes }}</p>

    <span class="status-chip" [style.background-color]="statusColor">
      {{ statusLabel }}
    </span>
  </div>

  <div class="card-actions">
    <button class="icon-btn" type="button" title="View Preconsultation" aria-label="View Preconsultation" (click)="preconsultation.emit()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 12h6" />
        <path d="M9 16h4" />
        <path d="M4 19.5V5a2 2 0 0 1 2-2h8.5L20 8.5V19a2 2 0 0 1-2 2H6a2 2 0 0 1-2-1.5Z" />
        <path d="M14 3v6h6" />
      </svg>
    </button>

    <button
      *ngIf="allowManageActions"
      class="icon-btn"
      type="button"
      title="Edit Appointment"
      aria-label="Edit Appointment"
      (click)="edit.emit()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" />
      </svg>
    </button>

    <button
      *ngIf="allowManageActions"
      class="icon-btn"
      type="button"
      title="Postpone Appointment"
      aria-label="Postpone Appointment"
      (click)="postpone.emit()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
    </button>

    <button
      *ngIf="allowManageActions"
      class="icon-btn danger"
      type="button"
      title="Request Cancellation"
      aria-label="Request Cancellation"
      (click)="delete.emit()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-1 14H6L5 6m3 0V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2" />
      </svg>
    </button>
  </div>
</article>
