<section class="notif-hero">
  <div class="container">
    <div class="hero-content">
      <h1>Notifications</h1>
      <p>Review appointment updates and respond quickly.</p>
    </div>
  </div>
</section>

<section class="notif-section">
  <div class="container notif-container">
    <ng-container *ngIf="isLoading">
      <div class="notif-skeleton" *ngFor="let i of [1,2,3,4]"></div>
    </ng-container>

    <ng-container *ngIf="!isLoading">
      <div class="notif-toolbar" *ngIf="totalCount > 0">
        <span class="notif-count">
          {{ totalCount }} notification{{ totalCount !== 1 ? 's' : '' }}
          <span *ngIf="unreadCount > 0" class="unread-pill">{{ unreadCount }} unread</span>
        </span>
        <button
          type="button"
          class="btn-mark-all"
          (click)="markAllAsRead()"
          [disabled]="unreadCount === 0"
        >
          Mark all as read
        </button>
      </div>

      <div class="notif-groups" *ngIf="totalCount > 0">
        <section class="notif-group" *ngFor="let group of groups">
          <h3 class="notif-group-label">{{ group.label }}</h3>
          <div class="notif-items">
            <app-notification-item
              *ngFor="let item of group.notifications; trackBy: trackById"
              [notification]="item"
              (readRequest)="onMarkRead($event)"
              (actionDone)="onActionDone($event)"
            ></app-notification-item>
          </div>
        </section>
      </div>

      <div class="empty-state" *ngIf="totalCount === 0">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        <h3>You're all caught up!</h3>
        <p>No notifications at the moment.</p>
      </div>
    </ng-container>
  </div>
</section>
