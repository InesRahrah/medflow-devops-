spring.application.name=appointment-service
spring.config.import=optional:file:.env[.properties]

# Database configs
spring.datasource.url=jdbc:mysql://localhost:4306/medflow_appointments?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jackson Config
spring.jackson.default-property-inclusion=always

# Server Port (optional: change if needed)
server.port=8081

# Notification integration
notification.service.enabled=true
notification.service.base-url=http://localhost:8081
notification.service.endpoint=/api/v1/notifications/internal
user.service.base-url=http://localhost:8080
server.error.include-message=always

# Appointment reminder emails (24h before scheduled time)
appointment.reminder.enabled=true
appointment.reminder.lead-hours=0
appointment.reminder.window-minutes=60
appointment.reminder.cron=*/30 * * * * *

# Telemedicine meeting link generation
# Set telemed.provider=ZOOM to create real Zoom meetings via Zoom API.
telemed.provider=ZOOM
telemed.base-url=https://meet.jit.si

# Zoom API integration (required when telemed.provider=ZOOM)
zoom.oauth-url=https://zoom.us/oauth/token
zoom.api-base-url=https://api.zoom.us/v2
zoom.account-id=${ZOOM_ACCOUNT_ID:}
zoom.client-id=${ZOOM_CLIENT_ID:}
zoom.client-secret=${ZOOM_CLIENT_SECRET:}
zoom.user-id=${ZOOM_USER_ID:me}
# false: use shared host from zoom.user-id, true: host meetings as each doctor's Zoom email
zoom.use-doctor-host=false
zoom.meeting.duration-minutes=30
zoom.meeting.timezone=UTC

# SMTP settings for MedFlow reminder mailbox
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=medflow1111111@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
