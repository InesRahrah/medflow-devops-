spring.application.name=user-service
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000
application.security.face.threshold=${FACE_MATCH_THRESHOLD:0.5}

google.client.id=${GOOGLE_CLIENT_ID:}

spring.jackson.default-property-inclusion=always

logging.level.com.medflow.userservice.security=DEBUG
logging.level.org.springframework.security=DEBUG

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

hospital.service.base-url=${HOSPITAL_SERVICE_BASE_URL:http://localhost:8085}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
